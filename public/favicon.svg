<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect x="0" y="0" width="14" height="14" rx="2" fill="#4F46E5"/>
  <rect x="17" y="0" width="14" height="14" rx="2" fill="#7C3AED"/>
  <rect x="34" y="0" width="14" height="14" rx="2" fill="#A78BFA"/>
