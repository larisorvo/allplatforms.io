<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('ap-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.classList.add('dark');})()</script>
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://allplatforms.io/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6151MG4WFW"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6151MG4WFW');</script>
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{META_TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="https://allplatforms.io/">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .icon-fade-1 { fill: rgba(0,0,0,0.09); }
    .icon-fade-2 { fill: rgba(0,0,0,0.05); }
    .icon-fade-3 { fill: rgba(0,0,0,0.03); }
    .icon-fade-4 { fill: rgba(0,0,0,0.015); }
    html.dark .icon-fade-1 { fill: rgba(255,255,255,0.13); }
    html.dark .icon-fade-2 { fill: rgba(255,255,255,0.06); }
    html.dark .icon-fade-3 { fill: rgba(255,255,255,0.04); }
    html.dark .icon-fade-4 { fill: rgba(255,255,255,0.02); }
    .homepage-hero { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); }
    html.dark .homepage-hero { background: #111827; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans">

  <!-- Navigation -->
  <nav class="bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
      <a href="/" class="flex items-center gap-2" aria-label="allplatforms.io">
        <svg width="28" height="28" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="14" height="14" rx="2" fill="#4F46E5"/>
          <rect x="17" y="0" width="14" height="14" rx="2" fill="#7C3AED"/>
          <rect x="34" y="0" width="14" height="14" rx="2" fill="#A78BFA"/>
          <rect x="0" y="17" width="14" height="14" rx="2" fill="#EC4899"/>
          <rect x="17" y="17" width="14" height="14" rx="2" class="icon-fade-1"/>
          <rect x="34" y="17" width="14" height="14" rx="2" class="icon-fade-2"/>
          <rect x="0" y="34" width="14" height="14" rx="2" class="icon-fade-2"/>
          <rect x="17" y="34" width="14" height="14" rx="2" class="icon-fade-3"/>
          <rect x="34" y="34" width="14" height="14" rx="2" class="icon-fade-4"/>
        </svg>
        <span class="text-gray-900 dark:text-white" style="font-family:'DM Sans',sans-serif;font-weight:500;font-size:18px;letter-spacing:-0.02em;">allplatforms<span class="text-violet-600 dark:text-violet-400" style="font-family:'Space Mono',monospace;font-weight:400;font-size:13px;letter-spacing:0.01em;">.io</span></span>
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <div class="homepage-hero text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-3">Social Media Specs</h1>
      <p class="text-indigo-200 dark:text-gray-400 text-xl max-w-2xl">Image sizes, video requirements, character limits, and ad specs for every major platform — all in one place.</p>
      <div class="mt-6">
        <input
          type="text"
          id="platform-filter"
          placeholder="Filter platforms..."
          class="w-full max-w-sm bg-white/20 dark:bg-gray-800 border border-white/30 dark:border-gray-600 text-white placeholder-white/60 dark:placeholder-gray-500 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-white dark:focus:border-indigo-400"
          oninput="filterPlatforms(this.value)"
        >
      </div>
    </div>
  </div>

  <!-- Platform grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">{{PLATFORM_COUNT}} platforms</p>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3" id="platform-grid">
      {{PLATFORM_CARDS}}
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-indigo-900 dark:bg-gray-950 text-indigo-300 dark:text-gray-500 text-sm mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row justify-between gap-3">
      <p class="whitespace-nowrap" style="font-family:'DM Sans',sans-serif;font-weight:500;"><span style="background:linear-gradient(to right,#A78BFA,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">allplatforms</span><span style="font-family:'Space Mono',monospace;font-weight:400;font-size:0.8em;color:#A78BFA;">.io</span></p>
      <p class="flex-1 text-violet-300 dark:text-gray-500">Spec data verified against official platform documentation. Updated regularly.</p>
      <button id="theme-toggle" onclick="toggleTheme()" class="self-start sm:self-auto inline-flex items-center gap-1.5 text-xs text-indigo-300 dark:text-gray-400 hover:text-white dark:hover:text-gray-200 bg-indigo-800 dark:bg-gray-800 hover:bg-indigo-700 dark:hover:bg-gray-700 px-3 py-1.5 rounded-full transition-colors whitespace-nowrap" aria-label="Toggle color theme">
        <span id="theme-icon"></span>
        <span id="theme-label"></span>
      </button>
    </div>
  </footer>

  <script>
    function filterPlatforms(query) {
      var q = query.toLowerCase();
      document.querySelectorAll('#platform-grid > a').forEach(function(card) {
        card.style.display = (card.dataset.platform || '').includes(q) || q === '' ? '' : 'none';
      });
    }
    function toggleTheme() {
      var dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ap-theme', dark ? 'dark' : 'light');
      updateThemeToggle(dark);
    }
    function updateThemeToggle(dark) {
      var icon = document.getElementById('theme-icon');
      var label = document.getElementById('theme-label');
      if (icon) icon.textContent = dark ? '☀' : '🌙';
      if (label) label.textContent = dark ? 'Light mode' : 'Dark mode';
    }
    updateThemeToggle(document.documentElement.classList.contains('dark'));
  </script>

</body>
</html>
