<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://allplatforms.io/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{META_TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="https://allplatforms.io/">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

  <!-- Navigation -->
  <nav class="bg-gray-900 border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
      <a href="/" class="flex items-center gap-2" aria-label="allplatforms.io">
        <svg width="28" height="28" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="14" height="14" rx="2" fill="#4F46E5"/>
          <rect x="17" y="0" width="14" height="14" rx="2" fill="#7C3AED"/>
          <rect x="34" y="0" width="14" height="14" rx="2" fill="#A78BFA"/>
          <rect x="0" y="17" width="14" height="14" rx="2" fill="#EC4899"/>
          <rect x="17" y="17" width="14" height="14" rx="2" fill="rgba(255,255,255,0.13)"/>
          <rect x="34" y="17" width="14" height="14" rx="2" fill="rgba(255,255,255,0.06)"/>
          <rect x="0" y="34" width="14" height="14" rx="2" fill="rgba(255,255,255,0.06)"/>
          <rect x="17" y="34" width="14" height="14" rx="2" fill="rgba(255,255,255,0.04)"/>
          <rect x="34" y="34" width="14" height="14" rx="2" fill="rgba(255,255,255,0.02)"/>
        </svg>
        <span style="font-family:'DM Sans',sans-serif;font-weight:500;font-size:18px;color:#fff;letter-spacing:-0.02em;">allplatforms<span style="font-family:'Space Mono',monospace;font-weight:400;font-size:13px;color:#A78BFA;letter-spacing:0.01em;">.io</span></span>
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <div class="bg-gray-900 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-3">Social Media Specs</h1>
      <p class="text-gray-400 text-xl max-w-2xl">Image sizes, video requirements, character limits, and ad specs for every major platform — all in one place.</p>
      <div class="mt-6">
        <input
          type="text"
          id="platform-filter"
          placeholder="Filter platforms..."
          class="w-full max-w-sm bg-gray-800 border border-gray-600 text-white placeholder-gray-500 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-400"
          oninput="filterPlatforms(this.value)"
        >
      </div>
    </div>
  </div>

  <!-- Platform grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <p class="text-sm text-gray-500 mb-4">{{PLATFORM_COUNT}} platforms</p>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3" id="platform-grid">
      {{PLATFORM_CARDS}}
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-500 text-sm mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row justify-between gap-2">
      <p style="font-family:'DM Sans',sans-serif;font-weight:500;color:#fff;">allplatforms<span style="font-family:'Space Mono',monospace;font-weight:400;font-size:0.8em;color:#A78BFA;">.io</span></p>
      <p>Spec data verified against official platform documentation. Updated regularly.</p>
    </div>
  </footer>

  <script>
    function filterPlatforms(query) {
      const q = query.toLowerCase();
      document.querySelectorAll('#platform-grid > a').forEach(function(card) {
        card.style.display = (card.dataset.platform || '').includes(q) || q === '' ? '' : 'none';
      });
    }
  </script>

</body>
</html>
